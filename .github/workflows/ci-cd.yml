name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build-docker:
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t codeaura .

  deploy-aws:
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd CodeAura || git clone https://github.com/CoderAnush/CodeAura.git
            cd CodeAura
            git pull origin main
            docker build -t codeaura .
            docker stop codeaura || true
            docker rm codeaura || true
            docker run -d -p 8000:8000 --name codeaura codeaura
