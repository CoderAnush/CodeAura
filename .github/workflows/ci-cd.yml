name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Tests - MUST PASS
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pip install pytest pytest-cov
        pytest backend/tests/ -v --tb=short

  # Frontend Build - MUST PASS
  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend-react/package-lock.json

    - name: Install dependencies
      working-directory: frontend-react
      run: npm ci --legacy-peer-deps

    - name: Build frontend
      working-directory: frontend-react
      run: npm run build

  # Security Scanning - OPTIONAL
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    continue-on-error: true

    steps:
    - uses: actions/checkout@v3

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Build Docker Image - MUST PASS
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [backend-tests, frontend-build]

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t codeaura:latest .

    - name: Test Docker image
      run: |
        docker run --rm codeaura:latest python -c "from backend.main import app; print('✅ Docker image valid')"

  # Deploy to AWS - CONDITIONAL ON SECRETS
  deploy-aws:
    runs-on: ubuntu-latest
    name: Deploy to AWS
    needs: [build-docker]

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_KEY: ${{ secrets.EC2_PRIVATE_KEY }}

    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.EC2_HOST != ''

    environment:
      name: production
      url: http://${{ env.EC2_HOST }}:8000

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_USER }}
        key: ${{ env.EC2_KEY }}
        script: |
          cd /home/${{ env.EC2_USER }}/codeaura || (git clone https://github.com/CoderAnush/CodeAura.git && cd CodeAura)
          git pull origin main
          docker build -t codeaura:latest .
          docker stop codeaura || true
          docker rm codeaura || true
          docker run -d -p 8000:8000 --name codeaura codeaura:latest
          sleep 3
          curl -f http://localhost:8000/docs || exit 1

  # Pipeline Summary
  pipeline-summary:
    runs-on: ubuntu-latest
    name: Pipeline Summary
    needs: [backend-tests, frontend-build, security-scan, build-docker, deploy-aws]
    if: always()

    steps:
    - name: Pipeline Status
      run: |
        echo "✅ CI/CD Pipeline Complete"
        echo ""
        echo "Jobs:"
        echo "  • Backend Tests: ${{ needs.backend-tests.result }}"
        echo "  • Frontend Build: ${{ needs.frontend-build.result }}"
        echo "  • Security Scan: ${{ needs.security-scan.result }}"
        echo "  • Docker Build: ${{ needs.build-docker.result }}"
        echo "  • AWS Deploy: ${{ needs.deploy-aws.result }}"

        if [ "${{ needs.backend-tests.result }}" != "success" ] || [ "${{ needs.frontend-build.result }}" != "success" ] || [ "${{ needs.build-docker.result }}" != "success" ]; then
          exit 1
        fi
